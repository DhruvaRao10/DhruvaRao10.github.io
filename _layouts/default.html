<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != "Home" %}{{ page.title }}{% else %}Home{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | truncate: 160 }}">

  <!-- Open Graph / social link previews -->
  <meta property="og:title" content="{% if page.title and page.title != 'Home' %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_html | truncate: 160 }}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta name="twitter:card" content="summary">

  <!-- RSS feed discovery -->
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | absolute_url }}">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <div class="container">
    <header>
      <nav>
        <a href="{{ '/' | relative_url }}">Dhruva Rao</a>
        <a href="{{ '/research/' | relative_url }}">Research</a>
        <a href="{{ '/writing/' | relative_url }}">Writing</a>
        <a href="{{ '/code/' | relative_url }}">Code</a>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>

    <footer>
      <p>Dhruva Rao &middot; <a href="https://github.com/DhruvaRao10">GitHub</a> &middot; <a href="https://x.com/tech_dharmic">Twitter</a> &middot; <a href="https://huggingface.co/DrDrunkenstein22">Hugging Face</a> &middot; <a href="{{ '/feed.xml' | relative_url }}">RSS</a></p>
    </footer>
  </div>
</body>
</html>
