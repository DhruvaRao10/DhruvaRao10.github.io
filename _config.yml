# The Site Configuration
#
# This site uses a custom minimal theme (see _layouts/ and assets/css/main.css).
# The jekyll-theme-chirpy gem is kept only for the plugins it bundles
# (jekyll-feed, jekyll-seo-tag, jekyll-sitemap). The Chirpy layouts/styles
# are intentionally not used.

theme: jekyll-theme-chirpy

lang: en
timezone: Asia/Kolkata

# ── Site identity ──────────────────────────────────────────────
title: Dhruva Rao
tagline: Software engineer, ML researcher, writer
description: >-
  Dhruva Rao — software engineer and ML researcher working on language models
  for low-resource languages, physics reasoning, and embedded systems.

# Fill in the protocol & hostname for your site (no trailing slash).
url: "https://DhruvaRao10.github.io"
baseurl: ""

github:
  username: DhruvaRao10

twitter:
  username: tech_dharmic

social:
  name: Dhruva Rao
  email: # leave blank to keep it off the page
  links:
    - https://x.com/tech_dharmic
    - https://github.com/DhruvaRao10
    - https://huggingface.co/DrDrunkenstein22

# Global switch for the table of contents in posts.
# Per-post override: add `toc: true|false` to the post front matter.
toc: false

paginate: 10

# ── Markdown / syntax highlighting ─────────────────────────────
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

# ── Collections & defaults ─────────────────────────────────────
collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /posts/:title/
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

exclude:
  - "*.gem"
  - "*.gemspec"
  - tools
  - README.md
  - WRITING.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - "*.config.js"
  - "package*.json"
  - vendor
